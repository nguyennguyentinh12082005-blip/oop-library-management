<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f1a;display:flex;justify-content:center;padding:20px}
text{font-family:'Segoe UI',Arial,sans-serif}
.t{fill:#4dd0e1;font-size:11px;text-anchor:middle;dominant-baseline:central}
.ts{fill:#4dd0e1;font-size:10px;text-anchor:middle;dominant-baseline:central}
.title{fill:#4dd0e1;font-size:15px;text-anchor:middle;font-weight:bold}
.ln{stroke:#4dd0e1;stroke-width:1.2;fill:none}
.sh{stroke:#4dd0e1;stroke-width:1.3;fill:rgba(77,208,225,0.04)}
.dm{stroke:#4dd0e1;stroke-width:1.3;fill:rgba(77,208,225,0.04)}
.end{stroke:#e57373;stroke-width:1.3;fill:rgba(229,115,115,0.06)}
.yes{fill:#81c784;font-size:9px;text-anchor:middle}
.no{fill:#e57373;font-size:9px;text-anchor:middle}
</style></head><body>
<svg width="620" height="1100" viewBox="0 0 620 1100">
<defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#4dd0e1"/></marker></defs>

<text x="310" y="22" class="title">Flowchart Tra Tai Lieu</text>

<!-- START -->
<ellipse cx="310" cy="55" rx="50" ry="18" class="end"/>
<text x="310" y="55" class="t" style="fill:#e57373">Bat dau</text>
<line x1="310" y1="73" x2="310" y2="98" class="ln" marker-end="url(#a)"/>

<!-- Nhap ma nguoi doc + ma tai lieu -->
<rect x="185" y="103" width="250" height="45" rx="3" class="sh"/>
<text x="310" y="119" class="t">Nhap ma nguoi doc</text>
<text x="310" y="135" class="t">Nhap ma tai lieu</text>
<line x1="310" y1="148" x2="310" y2="175" class="ln" marker-end="url(#a)"/>

<!-- Tim phieu muon dang mo? -->
<polygon points="310,180 420,220 310,260 200,220" class="dm"/>
<text x="310" y="215" class="ts">Tim thay phieu</text>
<text x="310" y="228" class="ts">muon dang mo?</text>

<line x1="420" y1="220" x2="520" y2="220" class="ln"/>
<text x="470" y="213" class="no">Khong</text>
<rect x="480" y="203" width="120" height="34" rx="3" class="end"/>
<text x="540" y="220" class="ts" style="fill:#e57373">Thong bao loi</text>

<!-- Yes -->
<line x1="310" y1="260" x2="310" y2="290" class="ln" marker-end="url(#a)"/>
<text x="295" y="278" class="yes">Co</text>

<!-- Tim nguoi doc + tai lieu -->
<polygon points="310,295 420,335 310,375 200,335" class="dm"/>
<text x="310" y="328" class="ts">Tim thay nguoi</text>
<text x="310" y="341" class="ts">doc va tai lieu?</text>

<line x1="420" y1="335" x2="520" y2="335" class="ln"/>
<text x="470" y="328" class="no">Khong</text>
<rect x="480" y="318" width="120" height="34" rx="3" class="end"/>
<text x="540" y="335" class="ts" style="fill:#e57373">Du lieu loi</text>

<!-- Yes -->
<line x1="310" y1="375" x2="310" y2="405" class="ln" marker-end="url(#a)"/>
<text x="295" y="393" class="yes">Co</text>

<!-- Nhap thong tin tra -->
<rect x="185" y="410" width="250" height="45" rx="3" class="sh"/>
<text x="310" y="426" class="t">Nhap ma nhan vien</text>
<text x="310" y="442" class="t">Nhap ngay tra (mac dinh = hom nay)</text>
<line x1="310" y1="455" x2="310" y2="485" class="ln" marker-end="url(#a)"/>

<!-- Cap nhat so luong -->
<rect x="185" y="490" width="250" height="45" rx="3" class="sh"/>
<text x="310" y="506" class="t">capNhatSoLuong(+1)</text>
<text x="310" y="522" class="t">giamSoSachMuon()</text>
<line x1="310" y1="535" x2="310" y2="565" class="ln" marker-end="url(#a)"/>

<!-- Tao giao dich Tra -->
<rect x="185" y="570" width="250" height="45" rx="3" class="sh"/>
<text x="310" y="586" class="t">Tao GiaoDich Tra</text>
<text x="310" y="602" class="t">dsGiaoDich.them()</text>
<line x1="310" y1="615" x2="310" y2="645" class="ln" marker-end="url(#a)"/>

<!-- Tinh tien phat -->
<rect x="160" y="650" width="300" height="55" rx="3" class="sh"/>
<text x="310" y="668" class="t">soNgayTre = ngayHenTra.daysUntil(ngayTra)</text>
<text x="310" y="684" class="t">tienPhat = soNgayTre * 5000</text>
<text x="310" y="698" class="ts">Xoa phieu muon dang mo</text>
<line x1="310" y1="705" x2="310" y2="735" class="ln" marker-end="url(#a)"/>

<!-- Kiem tra qua han -->
<polygon points="310,740 400,770 310,800 220,770" class="dm"/>
<text x="310" y="765" class="ts">soNgayTre</text>
<text x="310" y="778" class="ts">> 0?</text>

<!-- Co qua han -->
<line x1="400" y1="770" x2="500" y2="770" class="ln"/>
<text x="450" y="763" class="yes">Co</text>
<rect x="460" y="753" width="140" height="34" rx="3" class="sh"/>
<text x="530" y="764" class="ts">Tra tre han</text>
<text x="530" y="778" class="ts" style="fill:#e57373">Phat: soNgay*5000</text>

<!-- Khong qua han -->
<line x1="310" y1="800" x2="310" y2="835" class="ln" marker-end="url(#a)"/>
<text x="290" y="820" class="no">Khong</text>

<!-- In ket qua -->
<rect x="185" y="840" width="250" height="45" rx="3" class="sh"/>
<text x="310" y="856" class="t">"Tra thanh cong"</text>
<text x="310" y="872" class="t">In so ngay tre + tien phat</text>

<!-- Link tu Co qua han xuong -->
<line x1="530" y1="787" x2="530" y2="862" class="ln"/>
<line x1="530" y1="862" x2="435" y2="862" class="ln" marker-end="url(#a)"/>

<line x1="310" y1="885" x2="310" y2="915" class="ln" marker-end="url(#a)"/>

<!-- END -->
<ellipse cx="310" cy="935" rx="50" ry="18" class="end"/>
<text x="310" y="935" class="t" style="fill:#e57373">Ket thuc</text>

</svg></body></html>
