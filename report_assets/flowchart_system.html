<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f1a;display:flex;justify-content:center;padding:20px 10px}
text{font-family:'Segoe UI',Arial,sans-serif}
.t{fill:#4dd0e1;font-size:12px;text-anchor:middle;dominant-baseline:central}
.ts{fill:#4dd0e1;font-size:10px;text-anchor:middle;dominant-baseline:central}
.tl{fill:#80cbc4;font-size:10px;text-anchor:middle;dominant-baseline:central;font-style:italic}
.title{fill:#4dd0e1;font-size:15px;text-anchor:middle;font-weight:bold}
.ln{stroke:#4dd0e1;stroke-width:1.2;fill:none}
.sh{stroke:#4dd0e1;stroke-width:1.3;fill:rgba(77,208,225,0.04)}
.dm{stroke:#4dd0e1;stroke-width:1.3;fill:rgba(77,208,225,0.04)}
</style></head><body>
<svg width="1050" height="820" viewBox="0 0 1050 820">
<defs><marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#4dd0e1"/></marker></defs>

<text x="525" y="22" class="title">So do khoi tong quan he thong</text>

<!-- Nguoi dung -->
<ellipse cx="525" cy="60" rx="80" ry="25" class="sh"/>
<text x="525" y="60" class="t">Nguoi dung</text>
<line x1="525" y1="85" x2="525" y2="115" class="ln" marker-end="url(#a)"/>

<!-- Dang nhap / Dang ky -->
<polygon points="525,120 650,170 525,220 400,170" class="dm"/>
<text x="525" y="165" class="t">Dang nhap /</text>
<text x="525" y="180" class="t">Dang ky</text>

<!-- LEFT: Dang ky -->
<line x1="400" y1="170" x2="230" y2="170" class="ln" marker-end="url(#a)"/>
<text x="310" y="158" class="tl">Dang ky</text>

<!-- RIGHT: Dang nhap -->
<line x1="650" y1="170" x2="820" y2="170" class="ln" marker-end="url(#a)"/>
<text x="740" y="158" class="tl">Dang nhap</text>

<!-- Tao tai khoan doc gia -->
<rect x="110" y="152" width="120" height="38" rx="3" class="sh"/>
<text x="170" y="171" class="t">Tao tai khoan</text>

<!-- Kiem tra phan quyen -->
<polygon points="890,170 975,200 890,230 805,200" class="dm"/>
<text x="890" y="195" class="ts">Kiem tra</text>
<text x="890" y="208" class="ts">phan quyen</text>

<!-- Tao tai khoan -> Trang Doc gia -->
<line x1="170" y1="190" x2="170" y2="280" class="ln"/>
<line x1="170" y1="280" x2="255" y2="280" class="ln" marker-end="url(#a)"/>
<text x="220" y="260" class="tl">Doc gia</text>

<!-- Kiem tra -> Trang Quan tri -->
<line x1="890" y1="230" x2="890" y2="280" class="ln"/>
<line x1="890" y1="280" x2="815" y2="280" class="ln" marker-end="url(#a)"/>
<text x="830" y="260" class="tl">Quan tri / Nhan vien</text>

<!-- Trang Doc gia -->
<rect x="260" y="262" width="160" height="38" rx="16" class="sh"/>
<text x="340" y="281" class="t">Trang Doc gia</text>

<!-- Trang Quan tri -->
<rect x="660" y="262" width="160" height="38" rx="16" class="sh"/>
<text x="740" y="281" class="t">Trang Quan tri</text>

<!-- Doc gia sub-functions -->
<line x1="280" y1="300" x2="280" y2="340" class="ln"/>
<line x1="280" y1="340" x2="90" y2="340" class="ln" marker-end="url(#a)"/>
<line x1="340" y1="300" x2="340" y2="330" class="ln"/>
<line x1="340" y1="330" x2="260" y2="330" class="ln"/>
<line x1="260" y1="330" x2="260" y2="370" class="ln" marker-end="url(#a)"/>
<line x1="400" y1="300" x2="400" y2="370" class="ln" marker-end="url(#a)"/>

<!-- 3 boxes doc gia -->
<rect x="20" y="345" width="140" height="38" rx="3" class="sh"/>
<text x="90" y="364" class="ts">Tra cuu tai lieu</text>

<rect x="185" y="375" width="150" height="38" rx="3" class="sh"/>
<text x="260" y="388" class="ts">Xem sach trong</text>
<text x="260" y="401" class="ts">thu vien</text>

<rect x="350" y="375" width="140" height="38" rx="3" class="sh"/>
<text x="420" y="388" class="ts">Xem lich su</text>
<text x="420" y="401" class="ts">muon tra</text>

<!-- Quan tri sub-functions -->
<line x1="690" y1="300" x2="690" y2="370" class="ln" marker-end="url(#a)"/>
<line x1="720" y1="300" x2="720" y2="340" class="ln"/>
<line x1="720" y1="340" x2="760" y2="340" class="ln"/>
<line x1="760" y1="340" x2="760" y2="370" class="ln" marker-end="url(#a)"/>
<line x1="760" y1="300" x2="760" y2="330" class="ln"/>
<line x1="760" y1="330" x2="860" y2="330" class="ln"/>
<line x1="860" y1="330" x2="860" y2="370" class="ln" marker-end="url(#a)"/>
<line x1="800" y1="300" x2="800" y2="325" class="ln"/>
<line x1="800" y1="325" x2="970" y2="325" class="ln"/>
<line x1="970" y1="325" x2="970" y2="370" class="ln" marker-end="url(#a)"/>

<!-- 4 boxes quan tri -->
<rect x="620" y="375" width="140" height="38" rx="3" class="sh"/>
<text x="690" y="394" class="ts">Quan ly Tai lieu</text>

<rect x="730" y="375" width="130" height="38" rx="3" class="sh"/>
<text x="795" y="388" class="ts">Quan ly</text>
<text x="795" y="401" class="ts">Con nguoi</text>

<rect x="870" y="375" width="130" height="38" rx="3" class="sh"/>
<text x="935" y="388" class="ts">Quan ly</text>
<text x="935" y="401" class="ts">Muon/Tra</text>

<rect x="900" y="430" width="140" height="38" rx="3" class="sh"/>
<text x="970" y="443" class="ts">Quan ly</text>
<text x="970" y="456" class="ts">Nhap/Xuat</text>

<!-- ===== LocalStorage cylinder ===== -->
<!-- All bottom boxes connect to LocalStorage -->
<ellipse cx="525" cy="600" rx="100" ry="16" class="sh"/>
<rect x="425" y="600" width="200" height="40" style="stroke:none;fill:#0a0f1a"/>
<line x1="425" y1="600" x2="425" y2="640" class="ln"/>
<line x1="625" y1="600" x2="625" y2="640" class="ln"/>
<ellipse cx="525" cy="640" rx="100" ry="16" class="sh"/>
<text x="525" y="625" class="t">LocalStorage</text>

<!-- Arrows from left boxes to LocalStorage -->
<line x1="90" y1="383" x2="90" y2="550" class="ln"/>
<line x1="90" y1="550" x2="470" y2="550" class="ln"/>
<line x1="470" y1="550" x2="470" y2="585" class="ln" marker-end="url(#a)"/>

<line x1="260" y1="413" x2="260" y2="540" class="ln"/>
<line x1="260" y1="540" x2="490" y2="540" class="ln"/>
<line x1="490" y1="540" x2="490" y2="585" class="ln" marker-end="url(#a)"/>

<line x1="420" y1="413" x2="420" y2="530" class="ln"/>
<line x1="420" y1="530" x2="510" y2="530" class="ln"/>
<line x1="510" y1="530" x2="510" y2="585" class="ln" marker-end="url(#a)"/>

<!-- Arrows from right boxes to LocalStorage -->
<line x1="690" y1="413" x2="690" y2="530" class="ln"/>
<line x1="690" y1="530" x2="540" y2="530" class="ln"/>
<line x1="540" y1="530" x2="540" y2="585" class="ln" marker-end="url(#a)"/>

<line x1="795" y1="413" x2="795" y2="540" class="ln"/>
<line x1="795" y1="540" x2="555" y2="540" class="ln"/>
<line x1="555" y1="540" x2="555" y2="585" class="ln" marker-end="url(#a)"/>

<line x1="935" y1="413" x2="935" y2="550" class="ln"/>
<line x1="935" y1="550" x2="570" y2="550" class="ln"/>
<line x1="570" y1="550" x2="570" y2="585" class="ln" marker-end="url(#a)"/>

<line x1="970" y1="468" x2="970" y2="560" class="ln"/>
<line x1="970" y1="560" x2="585" y2="560" class="ln"/>
<line x1="585" y1="560" x2="585" y2="585" class="ln" marker-end="url(#a)"/>

</svg></body></html>
