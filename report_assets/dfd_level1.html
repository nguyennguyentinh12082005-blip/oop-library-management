<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0f1a; display: flex; justify-content: center; padding: 30px 10px; }
.t { fill: #4dd0e1; font-family: 'Segoe UI', Arial, sans-serif; font-size: 11.5px; text-anchor: middle; dominant-baseline: central; font-weight: bold; }
.ts { fill: #4dd0e1; font-family: 'Segoe UI', Arial, sans-serif; font-size: 9.5px; text-anchor: middle; dominant-baseline: central; }
.tl { fill: #80cbc4; font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; text-anchor: middle; dominant-baseline: central; font-style: italic; }
.title { fill: #4dd0e1; font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; text-anchor: middle; font-weight: bold; }
.ln { stroke: #4dd0e1; stroke-width: 1.3; fill: none; }
.sh { stroke: #4dd0e1; stroke-width: 1.4; fill: rgba(77,208,225,0.04); }
.ext { stroke: #e57373; stroke-width: 1.4; fill: rgba(229,115,115,0.06); }
</style>
</head>
<body>
<svg width="1100" height="940" viewBox="0 0 1100 940">
    <defs>
        <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#4dd0e1"/>
        </marker>
    </defs>

    <!-- Title -->
    <text x="550" y="35" class="title">So do DFD muc 1 - He thong Quan ly Thu vien</text>

    <!-- ===== COLUMN 1: EXTERNAL ENTITIES (Left, x=60, w=160, h=50) ===== -->
    <!-- Độc giả -->
    <rect x="60" y="115" width="160" height="50" rx="3" class="ext"/>
    <rect x="65" y="120" width="150" height="40" rx="2" class="ext"/>
    <text x="140" y="140" class="t" style="fill:#e57373;">DOC GIA</text>

    <!-- Nhân viên -->
    <rect x="60" y="475" width="160" height="50" rx="3" class="ext"/>
    <rect x="65" y="480" width="150" height="40" rx="2" class="ext"/>
    <text x="140" y="500" class="t" style="fill:#e57373;">NHAN VIEN</text>

    <!-- Quản trị viên -->
    <rect x="60" y="835" width="160" height="50" rx="3" class="ext"/>
    <rect x="65" y="840" width="150" height="40" rx="2" class="ext"/>
    <text x="140" y="860" class="t" style="fill:#e57373;">QUAN TRI VIEN</text>


    <!-- ===== COLUMN 2: PROCESSES (Center, cx=480, r=38) ===== -->
    <!-- P1: Quản lý người -->
    <circle cx="480" cy="140" r="38" class="sh"/>
    <text x="480" y="128" class="t">P1</text>
    <text x="480" y="146" class="ts">Quan ly</text>
    <text x="480" y="157" class="ts">Nguoi</text>

    <!-- P2: Quản lý tài liệu -->
    <circle cx="480" cy="320" r="38" class="sh"/>
    <text x="480" y="308" class="t">P2</text>
    <text x="480" y="326" class="ts">Quan ly</text>
    <text x="480" y="337" class="ts">Tai lieu</text>

    <!-- P3: Quản lý mượn trả -->
    <circle cx="480" cy="500" r="38" class="sh"/>
    <text x="480" y="488" class="t">P3</text>
    <text x="480" y="506" class="ts">Quan ly</text>
    <text x="480" y="517" class="ts">Muon/Tra</text>

    <!-- P4: Quản lý nhập xuất -->
    <circle cx="480" cy="680" r="38" class="sh"/>
    <text x="480" y="668" class="t">P4</text>
    <text x="480" y="686" class="ts">Quan ly</text>
    <text x="480" y="697" class="ts">Nhap/Xuat</text>

    <!-- P5: Quản lý giao dịch -->
    <circle cx="480" cy="860" r="38" class="sh"/>
    <text x="480" y="848" class="t">P5</text>
    <text x="480" y="866" class="ts">Quan ly</text>
    <text x="480" y="877" class="ts">Giao dich</text>


    <!-- ===== COLUMN 3: DATA STORES (Right, x=820, w=220, h=40) ===== -->
    <!-- D1: DS Người -->
    <rect x="820" y="120" width="220" height="40" style="stroke:none; fill:rgba(129,199,132,0.06);"/>
    <line x1="820" y1="120" x2="1040" y2="120" stroke="#81c784" stroke-width="1.5"/>
    <line x1="820" y1="160" x2="1040" y2="160" stroke="#81c784" stroke-width="1.5"/>
    <text x="842" y="140" class="ts" style="fill:#81c784;" text-anchor="middle">D1</text>
    <line x1="865" y1="120" x2="865" y2="160" stroke="#81c784" stroke-width="0.8"/>
    <text x="955" y="140" class="t" style="fill:#81c784;">DS Nguoi</text>

    <!-- D2: DS Tài liệu -->
    <rect x="820" y="300" width="220" height="40" style="stroke:none; fill:rgba(129,199,132,0.06);"/>
    <line x1="820" y1="300" x2="1040" y2="300" stroke="#81c784" stroke-width="1.5"/>
    <line x1="820" y1="340" x2="1040" y2="340" stroke="#81c784" stroke-width="1.5"/>
    <text x="842" y="320" class="ts" style="fill:#81c784;" text-anchor="middle">D2</text>
    <line x1="865" y1="300" x2="865" y2="340" stroke="#81c784" stroke-width="0.8"/>
    <text x="955" y="320" class="t" style="fill:#81c784;">DS Tai lieu</text>

    <!-- D4: Phiếu mượn đang mở -->
    <rect x="820" y="480" width="220" height="40" style="stroke:none; fill:rgba(129,199,132,0.06);"/>
    <line x1="820" y1="480" x2="1040" y2="480" stroke="#81c784" stroke-width="1.5"/>
    <line x1="820" y1="520" x2="1040" y2="520" stroke="#81c784" stroke-width="1.5"/>
    <text x="842" y="500" class="ts" style="fill:#81c784;" text-anchor="middle">D4</text>
    <line x1="865" y1="480" x2="865" y2="520" stroke="#81c784" stroke-width="0.8"/>
    <text x="955" y="500" class="t" style="fill:#81c784;">Phieu muon dang mo</text>

    <!-- D3: DS Giao dịch -->
    <rect x="820" y="840" width="220" height="40" style="stroke:none; fill:rgba(129,199,132,0.06);"/>
    <line x1="820" y1="840" x2="1040" y2="840" stroke="#81c784" stroke-width="1.5"/>
    <line x1="820" y1="880" x2="1040" y2="880" stroke="#81c784" stroke-width="1.5"/>
    <text x="842" y="860" class="ts" style="fill:#81c784;" text-anchor="middle">D3</text>
    <line x1="865" y1="840" x2="865" y2="880" stroke="#81c784" stroke-width="0.8"/>
    <text x="955" y="860" class="t" style="fill:#81c784;">DS Giao dich</text>


    <!-- ===== DATA FLOWS: LEFT TO CENTER (Entities -> Processes) ===== -->
    <!-- Độc giả -> P1 (Thông tin) -->
    <path d="M 220 140 H 442" class="ln" marker-end="url(#arr)"/>
    <text x="330" y="128" class="tl">Thong tin ca nhan</text>

    <!-- Độc giả -> P3 (Yêu cầu mượn/trả) -->
    <path d="M 220 140 H 260 V 490 H 442" class="ln" marker-end="url(#arr)"/>
    <text x="310" y="478" class="tl">Yeu cau muon/tra</text>

    <!-- Nhân viên -> P1 (Quản lý người) -->
    <path d="M 220 500 H 280 V 150 H 442" class="ln" marker-end="url(#arr)"/>
    <text x="350" y="162" class="tl">Quan ly nguoi doc, nhan vien</text>

    <!-- Nhân viên -> P2 (Quản lý tài liệu) -->
    <path d="M 220 500 H 300 V 320 H 442" class="ln" marker-end="url(#arr)"/>
    <text x="350" y="308" class="tl">Quan ly tai lieu</text>

    <!-- Nhân viên -> P3 (Xử lý mượn/trả) -->
    <path d="M 220 500 H 442" class="ln" marker-end="url(#arr)"/>
    <text x="330" y="512" class="tl">Xu ly muon/tra</text>

    <!-- Nhân viên -> P4 (Nhập/xuất) -->
    <path d="M 220 500 H 300 V 680 H 442" class="ln" marker-end="url(#arr)"/>
    <text x="350" y="668" class="tl">Nhap/Xuat tai lieu</text>

    <!-- Quản trị viên -> P1 (Phân quyền, quản lý user) -->
    <path d="M 220 860 H 320 V 130 H 442" class="ln" marker-end="url(#arr)"/>
    <text x="370" y="118" class="tl">Phan quyen, quan ly tai khoan</text>


    <!-- ===== DATA FLOWS: CENTER TO RIGHT (Processes -> Stores) ===== -->
    <!-- P1 -> D1 (Lưu người) -->
    <path d="M 518 140 H 820" class="ln" marker-end="url(#arr)"/>
    <text x="670" y="128" class="tl">Luu nguoi dung</text>

    <!-- P2 -> D2 (Lưu tài liệu) -->
    <path d="M 518 320 H 820" class="ln" marker-end="url(#arr)"/>
    <text x="670" y="308" class="tl">Luu tai lieu</text>

    <!-- P3 -> D4 (Tạo/xóa phiếu) -->
    <path d="M 518 500 H 820" class="ln" marker-end="url(#arr)"/>
    <text x="670" y="488" class="tl">Tao/xoa phieu muon</text>

    <!-- P3 -> D2 (Cập nhật SL sách - bypass x=700) -->
    <path d="M 518 500 H 700 V 330 H 820" class="ln" marker-end="url(#arr)"/>
    <text x="705" y="410" class="tl" text-anchor="start">Cap nhat SL</text>

    <!-- P3 -> D1 (Cập nhật số sách mượn - bypass x=730) -->
    <path d="M 518 500 H 730 V 150 H 820" class="ln" marker-end="url(#arr)"/>
    <text x="735" y="240" class="tl" text-anchor="start">Cap nhat so sach muon</text>

    <!-- P4 -> D2 (Cập nhật SL sách nhập/xuất - bypass x=760) -->
    <path d="M 518 680 H 760 V 310 H 820" class="ln" marker-end="url(#arr)"/>
    <text x="765" y="440" class="tl" text-anchor="start">Cap nhat SL</text>

    <!-- P3 -> P5 (Ghi giao dịch mượn/trả - bypass x=640) -->
    <path d="M 518 500 H 640 V 850 H 518" class="ln" marker-end="url(#arr)"/>
    <text x="645" y="730" class="tl" text-anchor="start">Ghi giao dich</text>

    <!-- P4 -> P5 (Ghi giao dịch nhập/xuất - bypass x=670) -->
    <path d="M 518 680 H 670 V 870 H 518" class="ln" marker-end="url(#arr)"/>
    <text x="675" y="770" class="tl" text-anchor="start">Ghi giao dich</text>

    <!-- P5 -> D3 (Lưu giao dịch) -->
    <path d="M 518 860 H 820" class="ln" marker-end="url(#arr)"/>
    <text x="670" y="848" class="tl">Luu lich su giao dich</text>

</svg>
</body>
</html>
