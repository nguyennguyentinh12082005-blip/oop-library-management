<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f1a;display:flex;justify-content:center;padding:20px}
text{font-family:'Segoe UI',Arial,sans-serif}
.t{fill:#4dd0e1;font-size:11px;text-anchor:middle;dominant-baseline:central}
.ts{fill:#4dd0e1;font-size:10px;text-anchor:middle;dominant-baseline:central}
.tl{fill:#80cbc4;font-size:10px;text-anchor:middle;dominant-baseline:central;font-style:italic}
.title{fill:#4dd0e1;font-size:15px;text-anchor:middle;font-weight:bold}
.ln{stroke:#4dd0e1;stroke-width:1.2;fill:none}
.sh{stroke:#4dd0e1;stroke-width:1.3;fill:rgba(77,208,225,0.04)}
.dm{stroke:#4dd0e1;stroke-width:1.3;fill:rgba(77,208,225,0.04)}
.end{stroke:#e57373;stroke-width:1.3;fill:rgba(229,115,115,0.06)}
.yes{fill:#81c784;font-size:9px;text-anchor:middle}
.no{fill:#e57373;font-size:9px;text-anchor:middle}
</style></head><body>

<!-- END -->
<ellipse cx="325" cy="1205" rx="50" ry="18" class="end"/>
<text x="325" y="1205" class="t" style="fill:#e57373">Ket thuc</text>
