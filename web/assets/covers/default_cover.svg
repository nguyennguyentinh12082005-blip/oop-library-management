<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300" viewBox="0 0 200 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f7fa" />
      <stop offset="100%" stop-color="#e4e8f0" />
    </linearGradient>
  </defs>
  <rect width="200" height="300" rx="12" fill="url(#bgGrad)" stroke="#d2d9e4" stroke-width="1.5" />
  
  <!-- Left spine highlight to look like a real book -->
  <rect x="0" y="0" width="14" height="300" rx="2" fill="#d0d7e5" opacity="0.7"/>
  <line x1="14" y1="0" x2="14" y2="300" stroke="#b8c4d9" stroke-width="1"/>
  
  <!-- Decorative inner border -->
  <rect x="25" y="20" width="150" height="260" rx="8" fill="none" stroke="#cfd7e3" stroke-dasharray="4 4" />
  
  <!-- Book Icon in the center -->
  <g transform="translate(68, 80)" fill="#7e8c9f">
    <path d="M0 45 C 10 40, 20 40, 32 45 C 44 40, 54 40, 64 45 L 64 5 L 32 0 L 0 5 Z" opacity="0.15"/>
    <path d="M32 5 L 60 9 L 60 44 C 50 40, 40 40, 32 43 L 32 5 Z" fill="#8e9db0"/>
    <path d="M32 5 L 4 9 L 4 44 C 14 40, 24 40, 32 43 L 32 5 Z" fill="#7e8c9f"/>
    <line x1="32" y1="5" x2="32" y2="43" stroke="#5d6b7c" stroke-width="1.5"/>
  </g>
  
  <text x="107" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#5d6b7c" text-anchor="middle">CHƯA CÓ</text>
  <text x="107" y="195" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill="#5d6b7c" text-anchor="middle">ẢNH BÌA</text>
  
  <!-- Simulated text lines below -->
  <rect x="45" y="225" width="110" height="6" rx="3" fill="#cbd4e1"/>
  <rect x="65" y="240" width="70" height="5" rx="2.5" fill="#dce2ec"/>
